<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Human Interest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Human Interest is a verified social community platform available on iOS and Android, connecting people through shared interests, creator-led channels, and live audio rooms."
  />

  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --muted: rgba(255,255,255,0.7);
      --soft: rgba(255,255,255,0.45);
      --line: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* HERO IMAGE */
    .hero {
      width: 100%;
      display: block;
    }

    /* VIDEO — full width, editorial feel */
    .video-section {
      width: 100%;
      background: #000;
    }

    .video-section video {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── NAV BAR (after video) ── */
    .site-nav {
      width: 100%;
      background: #000;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      height: 52px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .nav-links::-webkit-scrollbar {
      display: none;
    }

    .nav-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      white-space: nowrap;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .nav-links a:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.12);
    }

    .nav-cta {
      flex-shrink: 0;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      padding: 7px 16px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }

    .nav-cta:hover {
      border-color: #fff;
    }

    /* ABOUT SECTION */
    .about {
      background: #000;
      padding: 64px 20px;
      text-align: center;
      border-top: 1px solid var(--line);
    }

    .about-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .about-label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .about-title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin: 0;
      line-height: 1.2;
    }

    .about-body {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
    }

    .about-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .about-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
    }

    .about-links a:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.35);
    }

    /* ── SHARED CONTENT SECTION STYLES ── */
    .content-section {
      background: #000;
      padding: 72px 20px;
      text-align: center;
      border-top: 1px solid var(--line);
    }

    .content-section-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-eyebrow {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .section-title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin: 0;
      line-height: 1.2;
    }

    .section-body {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
    }

    .section-pull {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      margin: 8px 0 0;
    }

    /* HOW IT WORKS — three cards */
    .how-cards {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .how-card {
      flex: 1 1 180px;
      max-width: 220px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px 20px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .how-card-num {
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--soft);
    }

    .how-card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .how-card-body {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
    }

    .section-note {
      font-size: 13px;
      color: var(--soft);
      margin-top: 4px;
    }

    /* WHAT'S DIFFERENT — four points */
    .diff-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
      text-align: left;
    }

    .diff-item {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
    }

    .diff-item strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .diff-item span {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    /* HOST STRIP */
    .host-strip {
      background: rgba(255,255,255,0.04);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 56px 20px;
      text-align: center;
    }

    .host-strip-inner {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    /* DOWNLOAD SECTION */
    .download-section {
      background: #000;
      padding: 80px 20px;
      text-align: center;
      border-top: 1px solid var(--line);
    }

    .download-inner {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .download-title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      margin: 0;
    }

    .download-sub {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
    }

    .store-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .store-btn {
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      padding: 10px 22px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      transition: border-color 0.15s;
    }

    .store-btn:hover {
      border-color: #fff;
    }

    /* FOOTER */
    footer {
      margin-top: auto;
      background: #000;
      padding: 40px 20px 48px;
      text-align: center;
      border-top: 1px solid var(--line);
    }

    .footer-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .footer-email {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }

    .footer-email:hover {
      color: var(--text);
    }

    .footer-company {
      font-size: 13px;
      color: var(--soft);
    }

    .footer-links {
      margin-top: 4px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
    }

    .footer-links a:hover {
      color: var(--text);
      border-bottom-color: rgba(255,255,255,0.4);
    }

    /* IMAGE SECTIONS */
    .img-section {
      width: 100%;
      background: #000;
      display: block;
      line-height: 0;
    }

    .img-section-wrap {
      position: relative;
      width: 100%;
    }

    .section-img {
      width: 100%;
      height: auto;
      display: block;
    }

    .img-overlay {
      position: absolute;
      display: flex;
      align-items: center;
    }

    .overlay-btn {
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 10px 24px;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }

    .overlay-btn:hover {
      background: rgba(0,0,0,0.7);
      border-color: #fff;
    }

    /* Transparent clickable areas over image links */
    .img-link-area {
      position: absolute;
      display: block;
      cursor: pointer;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .site-nav-inner {
        gap: 6px;
      }

      .nav-links a {
        font-size: 12px;
        padding: 5px 10px;
      }

      .nav-cta {
        font-size: 12px;
        padding: 6px 12px;
      }

      .how-card {
        max-width: 100%;
        flex: 1 1 100%;
      }

      .section-title,
      .about-title {
        font-size: 22px;
      }

      .download-title {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <!-- NAV (sticky, top of page) -->
  <nav class="site-nav">
    <div class="site-nav-inner">
      <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#how-it-works">How it works</a>
        <a href="#for-hosts">For Hosts</a>
        <a href="#about">About</a>
        <a href="#download">Download</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <div id="home">
    <img src="HI_Website.png" alt="Human Interest" class="hero" />
  </div>

  <!-- VIDEO -->
  <section class="video-section">
    <video autoplay muted loop playsinline preload="auto">
      <source src="hero.mp4" type="video/mp4" />
      <source src="hero.mov" type="video/quicktime" />
    </video>
  </section>

  <!-- 1. ABOUT US -->
  <section id="about" class="img-section">
    <div class="img-section-wrap">
      <img src="1_ABOUT_US_.png" alt="About Us — Human Interest" class="section-img" />
      <!-- Transparent clickable area over "Contact Us" link in image -->
      <a class="img-link-area" style="left:35%;top:30%;width:14%;height:7%;"
         href="mailto:info@humaninterestapp.com" aria-label="Contact Us"></a>
    </div>
  </section>

  <!-- 2. HOW HUMAN INTEREST WORKS -->
  <section id="how-it-works" class="img-section">
    <img src="2_HOW_HUMAN_.png" alt="How Human Interest Works" class="section-img" />
  </section>

  <!-- 3. NOT ANOTHER SWIPE APP -->
  <section class="img-section">
    <img src="3_NO_ANOTHER_.png" alt="Not Another Swipe App" class="section-img" />
  </section>

  <!-- 4. LEAD A COMMUNITY / FOR HOSTS -->
  <section id="for-hosts" class="img-section">
    <div class="img-section-wrap">
      <img src="4_LEAD.png" alt="Lead a Community — Host on Human Interest" class="section-img" />
      <!-- Transparent clickable area over "Become a Host" link in image (~7% from left, ~32% from top) -->
      <a class="img-link-area" style="left:7%;top:30%;width:20%;height:7%;"
         href="mailto:info@humaninterestapp.com" aria-label="Become a Host"></a>
    </div>
  </section>

  <!-- 5. WHAT'S HAPPENING -->
  <section class="img-section">
    <img src="5_WHATS_HAPPENING.png" alt="What's Happening on Human Interest" class="section-img" />
  </section>

  <!-- 6. COME SAY HI / DOWNLOAD -->
  <section id="download" class="img-section">
    <div class="img-section-wrap">
      <img src="6SAY_HI.png" alt="Come Say HI — Download Human Interest" class="section-img" />
      <!-- Transparent clickable area over Google Play badge (~25% from left, ~54% from top) -->
      <a class="img-link-area" style="left:25%;top:54%;width:22%;height:14%;"
         href="https://play.google.com/store/apps/details?id=com.jeuxdevelopers.human_interest"
         target="_blank" rel="noopener" aria-label="Get it on Google Play"></a>
      <!-- Transparent clickable area over App Store badge (~54% from left, ~54% from top) -->
      <a class="img-link-area" style="left:54%;top:54%;width:18%;height:14%;"
         href="https://apps.apple.com/us/app/human-interest-app/id6758516908"
         target="_blank" rel="noopener" aria-label="Download on the App Store"></a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <a class="footer-email" href="mailto:info@humaninterestapp.com">
        info@humaninterestapp.com
      </a>

      <div class="footer-company">
        Human Interest Group, Inc.
      </div>

      <div class="footer-links">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms and Conditions</a>
        <a href="/community-guidelines.html">Community Guidelines</a>
        <a href="/child-safety.html">Child Safety</a>
        <a href="mailto:support@humaninterestapp.com">Support</a>
        <a href="mailto:support@humaninterestapp.com">Contact</a>
      </div>
    </div>
  </footer>

</body>
</html>
